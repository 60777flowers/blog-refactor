name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd blog
        npm install

    - name: Clone theme
      run: |
        cd blog/themes
        rm -rf butterfly
        git clone -b master https://github.com/jerryc127/hexo-theme-butterfly.git butterfly --depth 1

    - name: Generate
      run: |
        cd blog
        npx hexo clean
        npx hexo generate

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./blog/public
        force_orphan: true
